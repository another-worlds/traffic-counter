services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      JOB_RUNNER: local
      ENV: dev
      SOURCES_CONFIG: /app/config/sources.yaml
      # The iframe's effective origin depends on where Streamlit is reached
      # from (localhost on a laptop, a public IP/host on a VPS). Wildcard
      # avoids baking the deploy host into a static list; the API holds no
      # cookies, so the "*" + credentials trade-off doesn't apply.
      CORS_ORIGINS: "*"
    ports: ["8000:8000"]
    volumes:
      - storage:/data
      - ./api:/app
      - ./config:/app/config:ro
      # The yadisk root the user mounted on the host gets passed through at
      # the same path so the absolute paths in sources.yaml resolve inside
      # the container without remapping. Override via .env if you mount
      # somewhere else.
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      db:
        condition: service_healthy

  worker:
    # No `container_name` or port bindings — safe to run multiple
    # replicas via `docker compose up -d --scale worker=N`. To pick a
    # safe N for this GPU run `./scripts/gpu_probe.sh`; to apply it
    # run `./scripts/scale_workers.sh <N>`. Job claiming is serialized
    # by Postgres (SELECT … FOR UPDATE SKIP LOCKED in worker/main.py),
    # so replicas never race for the same video.
    build:
      context: ./worker
    runtime: nvidia
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      WORKER_MODE: poll
      MODEL_NAME: /models/yolov8m.pt
      DEVICE: cuda:0
      HALF: "true"
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - storage:/data
      - ./worker:/app
      - model_cache:/root/.cache
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      db:
        condition: service_healthy

  watcher:
    build:
      context: ./watcher
    environment:
      API_URL: http://api:8000
      SOURCES_CONFIG: /app/config/sources.yaml
      # WATCH_PATH is a legacy fallback used only when SOURCES_CONFIG is missing.
      WATCH_PATH: ${YADISK_HOST_PATH:-/mnt/yandex-videos}
      AUTO_ANALYZE: "false"   # set to "true" to auto-queue new videos
      SCAN_INTERVAL: "60"     # full rescan every 60 s
      STABILITY_WAIT: "5"     # seconds to wait before registering a new file
    volumes:
      - ./config:/app/config:ro
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://api:8000
      # PUBLIC_API_URL must be reachable from the user's browser. Leave
      # unset for single-host deployments — the React iframe will derive
      # the API host from window.location (port 8000). Set this only when
      # the API lives on a different host than Streamlit (split DNS, custom
      # ingress, HTTPS termination, etc.).
      # PUBLIC_API_URL: https://api.example.com
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "102400"
    ports: ["8501:8501"]
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  pgdata:
  storage:
  model_cache:
