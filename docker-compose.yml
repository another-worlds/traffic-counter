x-buildkit: &buildkit
  args:
    BUILDKIT_INLINE_CACHE: "1"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      <<: *buildkit
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      JOB_RUNNER: local
      ENV: dev
      YADISK_ROOT: /yadisk
    ports: ["8000:8000"]
    volumes:
      - storage:/data
      - ./api:/app
      # Yandex.Disk sync folder — set YADISK_HOST_PATH in your shell or .env
      # e.g.  YADISK_HOST_PATH=/home/user/Yandex.Disk
      - ${YADISK_HOST_PATH:-/tmp/yadisk-placeholder}:/yadisk:ro
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      <<: *buildkit
    runtime: nvidia
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      WORKER_MODE: poll
      MODEL_NAME: /models/yolov8m.pt
      DEVICE: cuda:0
      HALF: "true"
      NVIDIA_VISIBLE_DEVICES: all
      # — Concurrency / GPU tuning (uncomment to override defaults) —
      # WORKER_CONCURRENCY: "1"      # parallel jobs inside this container
      # CUDA_MEM_FRACTION: "0.9"     # VRAM cap per process (0–1); lower when
      #                               # WORKER_CONCURRENCY > 1
      # STUCK_JOB_TIMEOUT_MINUTES: "30"
      # FRAME_STRIDE: "2"            # skip every Nth frame (2 = 15fps from 30fps)
      # IMGSZ: "640"                 # YOLO input resolution (640 or 1280)
      # CONF: "0.40"                 # detection confidence threshold
      # IOU: "0.45"                  # NMS IoU threshold
    volumes:
      - storage:/data
      - ./worker:/app
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      <<: *buildkit
    environment:
      API_URL: http://api:8000
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "10240"
    ports: ["8501:8501"]
    volumes:
      - ./frontend:/app
    depends_on:
      - api

volumes:
  pgdata:
  storage:
  model_cache:
