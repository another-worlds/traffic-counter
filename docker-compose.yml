services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      JOB_RUNNER: local
      ENV: dev
    ports: ["8000:8000"]
    volumes:
      - storage:/data
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    runtime: nvidia
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      WORKER_MODE: poll
      MODEL_NAME: /models/yolov8m.pt
      DEVICE: cuda:0
      HALF: "true"
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - storage:/data
      - ./worker:/app
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://api:8000
      # PUBLIC_API_URL must be reachable from the user's browser (not Docker internal)
      PUBLIC_API_URL: http://localhost:8000
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "102400"
    ports: ["8501:8501"]
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  pgdata:
  storage:
  model_cache:
