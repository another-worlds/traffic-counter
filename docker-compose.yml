services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
      POSTGRES_DB: traffic
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      JOB_RUNNER: local
      ENV: dev
      SOURCES_CONFIG: /app/config/sources.yaml
      # The iframe's effective origin depends on where Streamlit is reached
      # from (localhost on a laptop, a public IP/host on a VPS). Wildcard
      # avoids baking the deploy host into a static list; the API holds no
      # cookies, so the "*" + credentials trade-off doesn't apply.
      CORS_ORIGINS: "*"
      # Make glibc return freed pages to the kernel more eagerly so Docker's
      # RSS-based mem_limit doesn't gradually creep past the budget after
      # transient parquet/sort allocations. Default is 128 KiB; the glibc
      # default of 128 MiB lets the heap baloon for the life of the process.
      MALLOC_TRIM_THRESHOLD_: "131072"
    ports: ["8000:8000"]
    # Cap RAM so a runaway trajectory load fails as a clean Docker stop
    # (uvicorn's lifespan shutdown closes DB connections gracefully)
    # instead of a kernel SIGKILL that leaves Postgres transactions
    # mid-flight — that was the failure mode behind the "Child process
    # died" + "unexpected EOF on client connection" crash pattern.
    mem_limit: 4g
    volumes:
      - storage:/data
      - ./api:/app
      - ./config:/app/config:ro
      # The yadisk root the user mounted on the host gets passed through at
      # the same path so the absolute paths in sources.yaml resolve inside
      # the container without remapping. Override via .env if you mount
      # somewhere else.
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      db:
        condition: service_healthy

  worker:
    # No `container_name` or port bindings — safe to run multiple
    # replicas via `docker compose up -d --scale worker=N`. To pick a
    # safe N for this GPU run `./scripts/gpu_probe.sh`; to apply it
    # run `./scripts/scale_workers.sh <N>`. Job claiming is serialized
    # by Postgres (SELECT … FOR UPDATE SKIP LOCKED in worker/main.py),
    # so replicas never race for the same video.
    #
    # Note: replicas above the GPU count rarely improve throughput.
    # CUDA streams serialise across processes on a single device, so
    # five replicas typically finish slower than one — and the extra
    # contention can stall per-batch YOLO inference long enough to
    # trigger the API's stale-claim reaper. Set N ≈ #GPUs unless you
    # have a specific reason.
    build:
      context: ./worker
    # Shared tag so the identical `monitor` build resolves to this same image
    # instead of storing/rebuilding a second copy of the multi-GB worker image.
    image: traffic-counter-worker
    runtime: nvidia
    # Default to a single worker. On one GPU that is the throughput
    # optimum — extra replicas serialise on the same CUDA streams and
    # finish slower. `docker compose up -d --scale worker=N` still
    # overrides this for multi-GPU hosts.
    deploy:
      replicas: 1
    environment:
      DATABASE_URL: postgresql+psycopg://traffic:traffic@db:5432/traffic
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /data
      WORKER_MODE: poll
      MODEL_NAME: /models/yolov8m.pt
      DEVICE: cuda:0
      HALF: "true"
      # Frames per GPU forward pass. Higher = better single-GPU
      # utilisation until VRAM fills; tune with ./scripts/gpu_probe.sh.
      BATCH_SIZE: "16"
      # Cap on how many scene-keyframes the worker emits per video.
      # Long CCTV recordings can otherwise produce 200+ JPEGs which
      # bloat /data and overwhelm the Count & Export page.
      MAX_SCENE_FRAMES: "30"
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - storage:/data
      - ./worker:/app
      - model_cache:/root/.cache
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      db:
        condition: service_healthy

  monitor:
    # Auto-launched pipeline logger. Reuses the worker image (already has the
    # tools in worker/tools/ + nvidia-smi via the nvidia runtime), polls the API
    # and GPU, and writes a structured JSONL to the host-readable ./logs dir so
    # the dashboard CLI can attach: `cd worker/tools && python pipeline_dashboard.py`.
    #
    # Captures pipeline events + GPU telemetry + health classification. Per-
    # container CPU/mem is NOT captured here (the image has no docker CLI); the
    # host-run dashboard fills that in live. _probe degrades gracefully when a
    # telemetry source is unavailable.
    build:
      context: ./worker
    # Same tag as `worker` — compose builds the worker image once and both
    # services reuse it (no second build, no duplicate image on disk).
    image: traffic-counter-worker
    runtime: nvidia
    working_dir: /app/tools          # so the tools' bare `import _probe`/`import _health` resolve
    command: python pipeline_logger.py --api http://api:8000 -o /logs/pipeline_events.jsonl -i 5
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./worker:/app                # match `worker`: run the live tools, not a stale image copy
      - ./logs:/logs                 # host bind-mount: a named volume would not be host-readable
    depends_on:
      - api
    restart: unless-stopped

  watcher:
    build:
      context: ./watcher
    environment:
      API_URL: http://api:8000
      SOURCES_CONFIG: /app/config/sources.yaml
      # WATCH_PATH is a legacy fallback used only when SOURCES_CONFIG is missing.
      WATCH_PATH: ${YADISK_HOST_PATH:-/mnt/yandex-videos}
      AUTO_ANALYZE: "false"   # set to "true" to auto-queue new videos
      SCAN_INTERVAL: "60"     # full rescan every 60 s
      STABILITY_WAIT: "5"     # seconds to wait before registering a new file
    volumes:
      - ./config:/app/config:ro
      - ${YADISK_HOST_PATH:-/mnt/yandex-videos}:${YADISK_HOST_PATH:-/mnt/yandex-videos}:ro
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://api:8000
      # PUBLIC_API_URL must be reachable from the user's browser. Leave
      # unset for single-host deployments — the React iframe will derive
      # the API host from window.location (port 8000). Set this only when
      # the API lives on a different host than Streamlit (split DNS, custom
      # ingress, HTTPS termination, etc.).
      # PUBLIC_API_URL: https://api.example.com
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "102400"
    ports: ["8501:8501"]
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  pgdata:
  storage:
  model_cache:
